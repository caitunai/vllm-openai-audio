# 工作流名称
name: Docker Build and Push

# 工作流触发器
on:
  push:
    # 仅在 main 分支被推送时触发
    branches: [ "main" ]
    # 当一个符合 'v*.*.*' 格式的 tag 被推送时触发 (例如 v1.0.0)
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # 指定运行此作业的操作系统
    runs-on: ubuntu-latest

    strategy:
      matrix:
        model:
          - name: 0.19.0-cu130
            value: v0.19.0-cu130
          - name: 0.19.0-cu129
            value: v0.19.0
    
    # 定义作业中的各个步骤
    steps:
      # 1. 检出代码
      # 拉取你的仓库代码到 Actions 的虚拟机中
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      # 2. Checkout onnx files
      - name: Git LFS pull
        run: git lfs pull
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录到 Docker Hub
      # 使用你存储在 GitHub Secrets 中的凭证进行登录
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 5. 【新增】登录到 GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # github.repository_owner 是仓库的所有者，作为 ghcr.io 的用户名
          username: ${{ github.repository_owner }}
          # GH_TOKEN 是由 GitHub Actions 自动生成的、具有时效性的令牌
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. 提取元数据 (镜像标签和名称)
      # 这是一个非常强大的步骤，可以根据 Git 的事件自动生成合适的 Docker 标签
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 格式为: '你的DockerHub用户名/你的仓库名'
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            # 当推送 'v1.2.3' 这样的 tag 时，会生成 '1.2.3' 标签
            type=semver,pattern=${{ matrix.model.name }}-{{version}}
            # 当推送 'v1.2' 这样的 tag 时，会生成 '1.2' 标签
            type=semver,pattern=${{ matrix.model.name }}-{{major}}.{{minor}}
            # 当推送到 main 分支时，会生成 'latest' 标签
            type=raw,value=${{ matrix.model.name }}-latest,enable={{is_default_branch}}

      # 7. 构建并推送 Docker 镜像
      # 使用 build-push-action 来执行构建和推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # 指定你的 Dockerfile 文件名
          file: ./Dockerfile
          # 仅支持 linux/amd64 平台
          platforms: linux/amd64
          # 设置为 true 以推送镜像
          push: true
          build-args: |
            VLLM_TAG=${{ matrix.model.value }}
          # 使用上一步生成的标签
          tags: ${{ steps.meta.outputs.tags }}
          # 使用上一步生成的标签作为镜像的 labels
          labels: ${{ steps.meta.outputs.labels }}
          # 启用构建缓存，以加快后续构建速度，暂时不启用，启用之后容易磁盘空间不足
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max
